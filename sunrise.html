<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise & Sunset Times</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ff6b6b 0%, #ffd93d 50%, #667eea 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .sun-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .sun-info {
            text-align: center;
        }
        .sun-icon {
            font-size: 100px;
            margin: 20px 0;
        }
        .time {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .sunrise-time {
            color: #ff6b6b;
        }
        .sunset-time {
            color: #667eea;
        }
        @media (max-width: 768px) {
            .sun-card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌅 Sun Times</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="today.html">Today</a></li>
                <li><a href="sunrise.html">Sunrise/Sunset</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>🌅 Sunrise & Sunset Times</h1>
        
        <div class="sun-card">
            <div class="sun-info">
                <h2>Sunrise</h2>
                <div class="sun-icon">🌅</div>
                <div class="time sunrise-time">6:45 AM</div>
                <p style="color: #666; font-size: 18px;">Dawn: 6:20 AM</p>
            </div>

            <div class="sun-info">
                <h2>Sunset</h2>
                <div class="sun-icon">🌇</div>
                <div class="time sunset-time">6:30 PM</div>
                <p style="color: #666; font-size: 18px;">Dusk: 6:55 PM</p>
            </div>
        </div>

        <div style="background: white; border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center;">
            <h3>Day Length</h3>
            <p style="font-size: 36px; color: #667eea; font-weight: bold; margin: 20px 0;">11 hours 45 minutes</p>
        </div>
    </div>
</body>
</html>
