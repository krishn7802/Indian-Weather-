<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 30px;
        }
        .contact-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #5568d3;
        }
        .contact-info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .icon {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">📧 Contact</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="today.html">Today</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>📧 Contact Us</h1>
        
        <div class="contact-card">
            <h2 style="margin-bottom: 20px;">Send us a Message</h2>
            
            <form onsubmit="event.preventDefault(); alert('Thank you for contacting us!');">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="Subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Your message..." required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>

            <div class="contact-info">
                <h3 style="margin-bottom: 20px;">Contact Information</h3>
                
                <div class="info-item">
                    <span class="icon">📧</span>
                    <div>
                        <strong>Email:</strong><br>
                        support@weatherapp.com
                    </div>
                </div>

                <div class="info-item">
                    <span class="icon">📞</span>
                    <div>
                        <strong>Phone:</strong><br>
                        +91 1234567890
                    </div>
                </div>

                <div class="info-item">
                    <span class="icon">📍</span>
                    <div>
                        <strong>Address:</strong><br>
                        Mumbai, Maharashtra, India
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
