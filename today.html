<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Weather - Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .city-name {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .date {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .temperature {
            font-size: 80px;
            color: #ff6b6b;
            font-weight: bold;
            margin: 20px 0;
        }
        .weather-icon {
            font-size: 100px;
            margin: 20px 0;
        }
        .weather-description {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .detail-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .detail-box h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .detail-box p {
            font-size: 24px;
            color: #333;
            font-weight: bold;
        }
        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        .search-box input {
            flex: 1;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
        }
        .search-box button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌦️ Weather App</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="today.html">Today's Weather</a></li>
                <li><a href="7day.html">7-Day Forecast</a></li>
                <li><a href="14day.html">14-Day Forecast</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="getWeather()">Get Weather</button>
        </div>

        <div class="weather-card" id="weatherCard">
            <h2 class="city-name" id="cityName">Mumbai, India</h2>
            <p class="date" id="currentDate">Monday, January 15, 2024</p>
            
            <div class="weather-icon" id="weatherIcon">☀️</div>
            <div class="temperature" id="temperature">28°C</div>
            <p class="weather-description" id="description">Partly Cloudy</p>

            <div class="weather-details">
                <div class="detail-box">
                    <h4>💧 Humidity</h4>
                    <p id="humidity">65%</p>
                </div>
                <div class="detail-box">
                    <h4>💨 Wind Speed</h4>
                    <p id="windSpeed">15 km/h</p>
                </div>
                <div class="detail-box">
                    <h4>🌡️ Feels Like</h4>
                    <p id="feelsLike">30°C</p>
                </div>
                <div class="detail-box">
                    <h4>👁️ Visibility</h4>
                    <p id="visibility">10 km</p>
                </div>
                <div class="detail-box">
                    <h4>🌅 Sunrise</h4>
                    <p id="sunrise">6:45 AM</p>
                </div>
                <div class="detail-box">
                    <h4>🌇 Sunset</h4>
                    <p id="sunset">6:30 PM</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Display current date
        const dateElement = document.getElementById('currentDate');
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = today.toLocaleDateString('en-US', options);

        // Weather API function
        async function getWeather() {
            const city = document.getElementById('cityInput').value || 'Mumbai';
            const apiKey = 'YOUR_API_KEY'; // OpenWeatherMap API key ghala
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
                const data = await response.json();
                
                if(data.cod === 200) {
                    document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
                    document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
                    document.getElementById('description').textContent = data.weather[0].description;
                    document.getElementById('humidity').textContent = `${data.main.humidity}%`;
                    document.getElementById('windSpeed').textContent = `${data.wind.speed} km/h`;
                    document.getElementById('feelsLike').textContent = `${Math.round(data.main.feels_like)}°C`;
                    document.getElementById('visibility').textContent = `${data.visibility / 1000} km`;
                    
                    // Weather icon
                    const iconCode = data.weather[0].main;
                    const icons = {
                        'Clear': '☀️',
                        'Clouds': '☁️',
                        'Rain': '🌧️',
                        'Snow': '❄️',
                        'Thunderstorm': '⛈️',
                        'Drizzle': '🌦️',
                        'Mist': '🌫️'
                    };
                    document.getElementById('weatherIcon').textContent = icons[iconCode] || '🌤️';
                } else {
                    alert('City not found!');
                }
            } catch(error) {
                console.error('Error:', error);
                alert('Failed to fetch weather data');
            }
        }

        // Auto-load weather on page load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const city = urlParams.get('city');
            if(city) {
                document.getElementById('cityInput').value = city;
                getWeather();
            }
        }
    </script>
</body>
</html>
