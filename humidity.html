<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humidity Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 30px;
        }
        .humidity-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .humidity-meter {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#667eea 0% 65%, #eee 65% 100%);
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .humidity-value {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">💧 Humidity Info</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="today.html">Today</a></li>
                <li><a href="humidity.html">Humidity</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>💧 Humidity Information</h1>
        
        <div class="humidity-card">
            <h2>Current Humidity Level</h2>
            <div class="humidity-meter">
                <div class="humidity-value">65%</div>
            </div>
            <p style="font-size: 20px; color: #666;">Moderate Humidity</p>

            <div class="info-grid">
                <div class="info-box">
                    <h4 style="color: #667eea;">Dew Point</h4>
                    <p style="font-size: 24px; font-weight: bold;">18°C</p>
                </div>
                <div class="info-box">
                    <h4 style="color: #667eea;">Comfort Level</h4>
                    <p style="font-size: 24px; font-weight: bold;">Good</p>
                </div>
                <div class="info-box">
                    <h4 style="color: #667eea;">Air Pressure</h4>
                    <p style="font-size: 24px; font-weight: bold;">1013 hPa</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
