<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Index (AQI)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 42px;
            margin-bottom: 30px;
        }
        .aqi-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        .aqi-value {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .aqi-number {
            font-size: 64px;
            font-weight: bold;
        }
        .aqi-label {
            font-size: 20px;
        }
        .pollutants {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .pollutant-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌫️ AQI Monitor</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="today.html">Today</a></li>
                <li><a href="aqi.html">AQI</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1>🌫️ Air Quality Index (AQI)</h1>
        
        <div class="aqi-card">
            <h2>Current Air Quality</h2>
            
            <div class="aqi-value">
                <div class="aqi-number">45</div>
                <div class="aqi-label">Good</div>
            </div>

            <p style="font-size: 18px; color: #666; margin: 20px 0;">Air quality is satisfactory, and air pollution poses little or no risk.</p>

            <h3 style="margin: 30px 0 20px; color: #333;">Pollutant Levels</h3>
            <div class="pollutants">
                <div class="pollutant-box">
                    <h4 style="color: #66a6ff;">PM2.5</h4>
                    <p style="font-size: 24px; font-weight: bold;">12 µg/m³</p>
                </div>
                <div class="pollutant-box">
                    <h4 style="color: #66a6ff;">PM10</h4>
                    <p style="font-size: 24px; font-weight: bold;">25 µg/m³</p>
                </div>
                <div class="pollutant-box">
                    <h4 style="color: #66a6ff;">O3</h4>
                    <p style="font-size: 24px; font-weight: bold;">35 µg/m³</p>
                </div>
                <div class="pollutant-box">
                    <h4 style="color: #66a6ff;">NO2</h4>
                    <p style="font-size: 24px; font-weight: bold;">18 µg/m³</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
